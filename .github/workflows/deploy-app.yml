name: Deploy flask app
on:
    workflow_dispatch:

jobs:
    
    deploy:
        runs-on: self-hosted
        env:
          DOCKERHUB_USER: ${{ vars.DOCKERHUB_USER }}

        steps:
            - name: code checkout
              uses: actions/checkout@v4

            - name: deploy with docket compose
              run: |
                docker compose down || true
                docker compose pull
                docker compose up -d


            
