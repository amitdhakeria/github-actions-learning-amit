            - name: login to docker
              uses: docker/login-action@v3
              with:
                username: ${{ vars.DOCKERHUB_USER }}
                password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: scan the image
              uses: aquasecurity/trivy-action@v0.36.0


